name: release-on-merge
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-on-merge
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/KoSpellCheck.VSCode/package-lock.json

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore NuGet packages
        run: dotnet restore src/KoSpellCheck.VS2022/KoSpellCheck.VS2022.csproj

      - name: Validate VS publish manifest
        shell: bash
        run: node scripts/validate-vs-publish-manifest.mjs src/KoSpellCheck.VS2022/publishManifest.json

      - name: Bump release version (patch)
        id: version
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/bump-version.sh
          VERSION="$(./scripts/bump-version.sh patch)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package extensions
        shell: bash
        run: |
          chmod +x scripts/pack.sh
          ./scripts/pack.sh

      - name: Verify release artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -f artifacts/vscode/KoSpellCheck.VSCode.vsix
          test -f artifacts/vsix/KoSpellCheck.VS2022.vsix
          ls -lh artifacts/vscode/KoSpellCheck.VSCode.vsix artifacts/vsix/KoSpellCheck.VS2022.vsix

      - name: Cleanup generated files
        shell: bash
        run: |
          rm -f src/KoSpellCheck.VS2022/extension.vsixmanifest

      - name: Commit release changes (if any)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No tracked changes to commit."
            exit 0
          fi
          git commit -m "chore(release): bump version to ${{ steps.version.outputs.version }}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Ensure release tag exists
        id: ensure_tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag already exists: $TAG"
            echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git tag "$TAG"
          if ! git push origin "refs/tags/$TAG"; then
            if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "refs/tags/$TAG$"; then
              echo "Tag already exists on remote (race): $TAG"
            else
              echo "Failed to push tag $TAG" >&2
              exit 1
            fi
          fi
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.ensure_tag.outputs.tag_name }}
          fail_on_unmatched_files: true
          files: |
            artifacts/vscode/KoSpellCheck.VSCode.vsix
            artifacts/vsix/KoSpellCheck.VS2022.vsix

      - name: Publish to VS Code Marketplace
        id: publish_vscode
        continue-on-error: true
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VS_MARKETPLACE_PAT || secrets.VSCE_TOKEN }}
          extensionFile: artifacts/vscode/KoSpellCheck.VSCode.vsix
          registryUrl: https://marketplace.visualstudio.com

      - name: VS publish preflight diagnostics
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const publishManifestPath = 'src/KoSpellCheck.VS2022/publishManifest.json';
          const vsixManifestPath = 'src/KoSpellCheck.VS2022/source.extension.vsixmanifest';
          const publishManifest = JSON.parse(fs.readFileSync(publishManifestPath, 'utf8'));
          const internalName = (publishManifest?.identity?.internalName ?? '').trim();
          const publishPublisher = (publishManifest?.publisher ?? '').trim();
          const vsixManifestContent = fs.readFileSync(vsixManifestPath, 'utf8');
          const identityTagMatch = vsixManifestContent.match(/<Identity\b[^>]*>/i);
          const identityTag = identityTagMatch ? identityTagMatch[0] : '';
          const vsixIdMatch = identityTag.match(/\bId="([^"]+)"/i);
          const vsixPublisherMatch = identityTag.match(/\bPublisher="([^"]+)"/i);
          const vsixId = vsixIdMatch ? vsixIdMatch[1].trim() : '';
          const vsixPublisher = vsixPublisherMatch ? vsixPublisherMatch[1].trim() : '';
          console.log(`[vs-publish-preflight] publishManifest.publisher=${publishPublisher}`);
          console.log(`[vs-publish-preflight] publishManifest.identity.internalName=${internalName}`);
          console.log(`[vs-publish-preflight] source.extension.vsixmanifest Identity@Id=${vsixId}`);
          console.log(`[vs-publish-preflight] source.extension.vsixmanifest Identity@Publisher=${vsixPublisher}`);
          NODE

      - name: Publish to Visual Studio Marketplace
        id: publish_vs2022
        if: ${{ hashFiles('artifacts/vsix/KoSpellCheck.VS2022.vsix') != '' }}
        continue-on-error: true
        uses: cezarypiatek/VsixPublisherAction@1.1
        with:
          extension-file: artifacts/vsix/KoSpellCheck.VS2022.vsix
          publish-manifest-file: src/KoSpellCheck.VS2022/publishManifest.json
          personal-access-code: ${{ secrets.VS_MARKETPLACE_PAT || secrets.VS_PUBLISHER_ACCESS_TOKEN || secrets.VSCE_TOKEN }}

      - name: Publish outcome summary
        if: always()
        shell: bash
        run: |
          VS2022_VSIX="artifacts/vsix/KoSpellCheck.VS2022.vsix"
          VS2022_ARTIFACT_EXISTS="false"
          if [[ -f "$VS2022_VSIX" ]]; then
            VS2022_ARTIFACT_EXISTS="true"
          fi

          echo "VS Code marketplace publish outcome: ${{ steps.publish_vscode.outcome }}"
          echo "Visual Studio marketplace publish outcome: ${{ steps.publish_vs2022.outcome }}"

          if [[ "$VS2022_ARTIFACT_EXISTS" != "true" ]]; then
            echo "::warning::VS2022 artifact is missing ($VS2022_VSIX), so Visual Studio Marketplace publish was skipped."
          fi

          if [[ "${{ steps.publish_vscode.outcome }}" != "success" ]]; then
            echo "::warning::VS Code Marketplace publish failed, but git tag and GitHub release were still created."
          fi

          if [[ "$VS2022_ARTIFACT_EXISTS" == "true" && "${{ steps.publish_vs2022.outcome }}" != "success" ]]; then
            echo "::warning::Visual Studio Marketplace publish failed, but git tag and GitHub release were still created."
          fi
