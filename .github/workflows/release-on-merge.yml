name: release-on-merge
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-on-merge
  cancel-in-progress: false

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/KoSpellCheck.VSCode/package-lock.json

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore NuGet packages
        run: dotnet restore src/KoSpellCheck.VS2022/KoSpellCheck.VS2022.csproj

      - name: Validate VS publish manifest
        shell: bash
        run: node scripts/validate-vs-publish-manifest.mjs src/KoSpellCheck.VS2022/publishManifest.json

      - name: Get version from Directory.Build.props
        id: version
        shell: bash
        run: |
          VERSION=$(grep -o "<Version>[^<]*</Version>" Directory.Build.props | head -n 1 | sed -e 's/<Version>//' -e 's#</Version>##')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package extensions
        shell: bash
        run: |
          chmod +x scripts/pack.sh
          ./scripts/pack.sh

      - name: Commit version bump and tag
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(release): bump version to ${{ steps.version.outputs.version }}"
          tagging_message: "v${{ steps.version.outputs.version }}"
          push_options: "--force"
          branch: ${{ github.ref }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            artifacts/vscode/KoSpellCheck.VSCode-${{ steps.version.outputs.version }}.vsix
            artifacts/vsix/KoSpellCheck.VS2022-${{ steps.version.outputs.version }}.vsix

      - name: Publish to VS Code Marketplace
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VSCE_TOKEN }}
          extensionFile: artifacts/vscode/KoSpellCheck.VSCode-${{ steps.version.outputs.version }}.vsix
          registryUrl: https://marketplace.visualstudio.com

      - name: VS publish preflight diagnostics
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const publishManifestPath = 'src/KoSpellCheck.VS2022/publishManifest.json';
          const vsixManifestPath = 'src/KoSpellCheck.VS2022/source.extension.vsixmanifest';
          const publishManifest = JSON.parse(fs.readFileSync(publishManifestPath, 'utf8'));
          const internalName = (publishManifest?.identity?.internalName ?? '').trim();
          const publishPublisher = (publishManifest?.publisher ?? '').trim();
          const vsixManifestContent = fs.readFileSync(vsixManifestPath, 'utf8');
          const identityTagMatch = vsixManifestContent.match(/<Identity\b[^>]*>/i);
          const identityTag = identityTagMatch ? identityTagMatch[0] : '';
          const vsixIdMatch = identityTag.match(/\bId="([^"]+)"/i);
          const vsixPublisherMatch = identityTag.match(/\bPublisher="([^"]+)"/i);
          const vsixId = vsixIdMatch ? vsixIdMatch[1].trim() : '';
          const vsixPublisher = vsixPublisherMatch ? vsixPublisherMatch[1].trim() : '';
          console.log(`[vs-publish-preflight] publishManifest.publisher=${publishPublisher}`);
          console.log(`[vs-publish-preflight] publishManifest.identity.internalName=${internalName}`);
          console.log(`[vs-publish-preflight] source.extension.vsixmanifest Identity@Id=${vsixId}`);
          console.log(`[vs-publish-preflight] source.extension.vsixmanifest Identity@Publisher=${vsixPublisher}`);
          NODE

      - name: Validate VS publisher token presence
        shell: bash
        env:
          VS_PUBLISHER_ACCESS_TOKEN: ${{ secrets.VS_PUBLISHER_ACCESS_TOKEN }}
        run: |
          if [ -z "${VS_PUBLISHER_ACCESS_TOKEN}" ]; then
            echo "::error::Missing required secret VS_PUBLISHER_ACCESS_TOKEN for Visual Studio Marketplace publish."
            exit 1
          fi

      - name: Publish to Visual Studio Marketplace
        uses: cezarypiatek/VsixPublisherAction@1.1
        with:
          extension-file: artifacts/vsix/KoSpellCheck.VS2022-${{ steps.version.outputs.version }}.vsix
          publish-manifest-file: src/KoSpellCheck.VS2022/publishManifest.json
          personal-access-code: ${{ secrets.VS_PUBLISHER_ACCESS_TOKEN }}
